name: RadioDroid Release

# 推送 v* 格式的 tag 时（例如 v0.93）自动触发发布流程
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build Release APKs & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 需要完整 git 历史，用于 gitHash() 构建脚本

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # -------------------------------------------------------
      # 签名配置（Release 构建）
      # 在 GitHub 仓库 Settings -> Secrets and variables -> Actions
      # 中添加以下 Secrets：
      #   KEYSTORE_BASE64  : base64 编码的 .jks / .keystore 文件
      #   KEYSTORE_PASSWORD: keystore 密码
      #   KEY_ALIAS        : key alias
      #   KEY_PASSWORD     : key 密码
      #
      # 如果没有自定义签名，保留 debug keystore 即可（跳过此步骤）
      # -------------------------------------------------------
      - name: Decode signing keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > ${{ github.workspace }}/release.keystore

      - name: Build free release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleFreeRelease --stacktrace

      - name: Build play release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assemblePlayRelease --stacktrace

      - name: Find APK files
        id: find_apks
        run: |
          FREE_APK=$(find app/build/outputs/apk/free/release -name "*.apk" | head -1)
          PLAY_APK=$(find app/build/outputs/apk/play/release -name "*.apk" | head -1)
          echo "free_apk=$FREE_APK" >> $GITHUB_OUTPUT
          echo "play_apk=$PLAY_APK" >> $GITHUB_OUTPUT
          echo "Free APK: $FREE_APK"
          echo "Play APK: $PLAY_APK"

      - name: Upload APKs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: |
            app/build/outputs/apk/free/release/*.apk
            app/build/outputs/apk/play/release/*.apk
          if-no-files-found: error

      # -------------------------------------------------------
      # 自动创建 GitHub Release 并上传 APK
      # 需要仓库开启 Actions 写权限：
      #   Settings -> Actions -> General -> Workflow permissions
      #   -> Read and write permissions
      # -------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/free/release/*.apk
            app/build/outputs/apk/play/release/*.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
