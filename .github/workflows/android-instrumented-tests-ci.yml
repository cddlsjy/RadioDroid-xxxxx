name: RadioDroid Instrumented Tests CI

# 仅在 master 分支推送时运行（Instrumentation 测试耗时较长）
on:
  push:
    branches:
      - master
  # 如需在 PR 时也运行，取消以下注释
  # pull_request:
  #   branches:
  #     - master

jobs:
  instrumented-tests:
    name: API ${{ matrix.api-level }} Instrumented Tests
    runs-on: macos-latest   # macOS runner 支持 Android 模拟器硬件加速
    strategy:
      fail-fast: false       # 某个 API 失败时不中断其他矩阵任务
      matrix:
        api-level: [16, 27, 33]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2

      # -------------------------------------------------------
      # AVD 快照缓存：首次构建需要约 10 分钟，之后走缓存只需 1-2 分钟
      # -------------------------------------------------------
      - name: Restore Android virtual device cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: RadioDroid-avd-api${{ matrix.api-level }}-${{ runner.os }}-v2

      - name: Create Android virtual device (if not cached)
        uses: reactivecircus/android-emulator-runner@v2
        if: steps.avd-cache.outputs.cache-hit != 'true'
        with:
          api-level: ${{ matrix.api-level }}
          arch: ${{ matrix.api-level < 21 && 'x86' || 'x86_64' }}
          target: ${{ matrix.api-level >= 30 && 'google_apis' || 'default' }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "AVD snapshot created for caching."

      # -------------------------------------------------------
      # 根据 API 级别选择测试变体：
      #   API  16: free flavor（最低兼容性验证）
      #   API  27: 全部 flavor（connectedCheck，回归测试）
      #   API  33: play flavor（最新 API + Google APIs）
      # -------------------------------------------------------
      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: ${{ matrix.api-level < 21 && 'x86' || 'x86_64' }}
          target: ${{ matrix.api-level >= 30 && 'google_apis' || 'default' }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb uninstall net.programmierecke.radiodroid2.test || true
            adb uninstall net.programmierecke.radiodroid2 || true
            gradle ${{ matrix.api-level < 26 && 'connectedFreeDebugAndroidTest' || matrix.api-level > 29 && 'installPlayDebugAndroidTest' || 'connectedCheck' }} --stacktrace

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results-api${{ matrix.api-level }}
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
          if-no-files-found: ignore
